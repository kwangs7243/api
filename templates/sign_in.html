<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>로그인</title>
    </head>
    <body class="page page-auth page-sign-in">
        <div class="auth-container">
            <main class="auth-main">
                <section class="auth-card">
                    <h1 class="auth-title">로그인</h1>

                    <form method="post" action="/sign/in" id="sign_in" class="form auth-form">
                        <div class="form-row">
                            <input type="text" name="login_id" class="form-input" placeholder="아이디" required>
                        </div>

                        <div class="form-row">
                            <input type="password" name="passwd" class="form-input" placeholder="비밀번호" required>
                        </div>

                        <p class="server-message">{{server_msg}}</p>
                        <p id="msg" class="form-message"></p>

                        <div class="form-row form-row-submit">
                            <button type="submit" class="btn btn-primary btn-block">로그인</button>
                        </div>
                    </form>

                    <div class="auth-links">
                        <a href="/sign/up" class="auth-link">회원가입</a>
                    </div>
                </section>
            </main>
        </div>

        <script src="{{ url_for('static', filename='sign_in.js') }}"></script>
    </body>
</html>
